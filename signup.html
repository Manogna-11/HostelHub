<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up | Hostel Hub</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar">
  <h2>🏠 Hostel Hub</h2>
</nav>

<section class="auth-box">
  <h2>
    <span class="glyphicon glyphicon-edit"></span> Create Account
  </h2>

  <form id="signupForm">

    <div class="input-group">
      <span class="input-group-addon">
        <span class="glyphicon glyphicon-user"></span>
      </span>
      <input type="text" id="name" class="form-control" placeholder="Full Name" required>
    </div>

    <br>

    <div class="input-group">
      <span class="input-group-addon">
        <span class="glyphicon glyphicon-envelope"></span>
      </span>
      <input type="email" id="email" class="form-control" placeholder="Email" required>
    </div>

    <br>

    <div class="input-group">
      <span class="input-group-addon">
        <span class="glyphicon glyphicon-earphone"></span>
      </span>
      <input type="text" id="mobile" class="form-control" placeholder="Mobile Number" required>
    </div>

    <br>

    <div class="input-group">
      <span class="input-group-addon">
        <span class="glyphicon glyphicon-map-marker"></span>
      </span>
      <input type="text" id="location" class="form-control" placeholder="Location" required>
    </div>

    <br>

    <div class="input-group">
      <span class="input-group-addon">
        <span class="glyphicon glyphicon-lock"></span>
      </span>
      <input type="password" id="password" class="form-control" placeholder="Password" required>
    </div>

    <br>

    <button type="submit" class="btn btn-success btn-block">
      <span class="glyphicon glyphicon-ok"></span> Sign Up
    </button>
  </form>

  <p style="margin-top:15px;">
    <span class="glyphicon glyphicon-log-in"></span>
    Already have an account?
    <a href="login.html">Login</a>
  </p>
</section>

<script src="js/script.js"></script>
</body>
</html>
